name: warm_rounded_safe
chunk_ms: 10
max_added_latency_ms: 50
stages:
  - type: preprocess
    name: audio_validation
    config:
      enabled: true
      mono: true
      target_sample_rate: ${audio.sample_rate}
  - type: repair
    name: dropout_click
    config:
      enabled: true
      timestamp_tolerance_ms: 0.5
      zero_frame:
        conceal: true
        threshold: 1.0e-7
        start_gain: 0.85
      tiny_gap:
        enabled: true
        max_ms: 2.0
        zero_threshold: 1.0e-7
      clicks:
        enabled: true
        abs_threshold: 0.35
        rms_multiple: 8.0
        max_repairs_per_frame: 8
  - type: filter
    name: dc_highpass
    config:
      enabled: true
      dc_blocker:
        enabled: true
        radius: 0.995
      highpass:
        enabled: true
        cutoff_hz: 85.0
        order: 2
      presence:
        enabled: false
  - type: repair
    name: decrackle
    config:
      enabled: true
      strength: mild
  - type: vad
    name: energy
    config: ${vad}
  - type: denoise
    name: spectral_gate
    config:
      enabled: true
      fft_size: 512
      hop_ms: 10
      oversubtraction: 0.55
      noise_update:
        vad_threshold: 0.35
        alpha: 0.995
      gain:
        min_gain_db: -6.0
        temporal_smoothing: 0.9
  - type: tone
    name: warm_rounded_voice
    config:
      mode: safe_warm
  - type: limiter
    name: limiter
    config:
      ceiling_dbfs: -1.0
