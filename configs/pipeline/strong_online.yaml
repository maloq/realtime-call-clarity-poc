name: strong_online
chunk_ms: 64
max_added_latency_ms: 200
stages:
  - type: preprocess
    name: audio_validation
    config:
      enabled: true
      mono: true
      target_sample_rate: ${audio.sample_rate}
  - type: repair
    name: dropout_click
    config:
      enabled: true
      timestamp_tolerance_ms: 0.5
      zero_frame:
        conceal: true
        threshold: 1.0e-7
        start_gain: 0.85
      tiny_gap:
        enabled: true
        max_ms: 2.0
        zero_threshold: 1.0e-7
      clicks:
        enabled: true
        abs_threshold: 0.35
        rms_multiple: 8.0
        max_repairs_per_frame: 8
  - type: repair
    name: decrackle
    config:
      enabled: true
      strength: mild
  - type: enhance
    name: strong_online
    config: ${enhance}
  - type: postfilter
    name: codec_artifact
    config:
      enabled: true
  - type: bandwidth
    name: guarded_exciter
    config:
      enabled: true
      narrowband_threshold: 0.70
      strength: 0.035
      drive: 1.5
      synth_highpass_hz: 3600.0
  - type: limiter
    name: limiter
    config:
      ceiling_dbfs: -1.5
