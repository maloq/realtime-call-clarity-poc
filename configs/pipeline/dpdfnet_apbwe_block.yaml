name: dpdfnet_apbwe_block
chunk_ms: 10
max_added_latency_ms: 500
stages:
  - type: denoise
    name: dpdfnet
    config: ${denoise}
  - type: bandwidth
    name: ap_bwe_block
    config:
      enabled: true
      task: 8kto16k
      cache_dir: data/checkpoints/ap_bwe
      auto_download: true
      device: ${runtime.device}
      hop_ms: 100
      left_context_ms: 250
      right_context_ms: 250
      blend: 1.0
      algorithmic_latency_ms: 350
