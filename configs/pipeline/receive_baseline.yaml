name: receive_baseline
chunk_ms: 10
max_added_latency_ms: 200
stages:
  - type: preprocess
    name: audio_validation
    config:
      enabled: true
      mono: true
      target_sample_rate: ${audio.sample_rate}
  - type: repair
    name: dropout_click
    config:
      enabled: true
      timestamp_tolerance_ms: 0.5
      zero_frame:
        conceal: true
        threshold: 1.0e-7
        start_gain: 0.85
      tiny_gap:
        enabled: true
        max_ms: 2.0
        zero_threshold: 1.0e-7
      clicks:
        enabled: true
        abs_threshold: 0.35
        rms_multiple: 8.0
        max_repairs_per_frame: 8
  - type: filter
    name: dc_highpass
    config:
      enabled: true
      dc_blocker:
        enabled: true
        radius: 0.995
      highpass:
        enabled: true
        cutoff_hz: 90.0
        order: 2
      presence:
        enabled: false
        center_hz: 3000.0
        q: 1.0
        boost_db: 1.5
  - type: repair
    name: decrackle
    config:
      enabled: true
      strength: mild
  - type: vad
    name: energy
    config: ${vad}
  - type: denoise
    name: spectral_gate
    config: ${denoise}
  - type: postfilter
    name: codec_artifact
    config:
      enabled: false
  - type: bandwidth
    name: guarded_exciter
    config:
      enabled: false
      narrowband_threshold: 0.65
      strength: 0.06
      drive: 1.8
      synth_highpass_hz: 3600.0
  - type: leveler
    name: speech_aware_agc
    config: ${leveler}
  - type: limiter
    name: limiter
    config:
      ceiling_dbfs: -1.5
