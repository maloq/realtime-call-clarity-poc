name: dpdfnet_flashsr_full_rounded_smooth
chunk_ms: 10
max_added_latency_ms: 50
stages:
  - type: denoise
    name: dpdfnet
    config:
      enabled: true
      model: dpdfnet2
      onnx_path: null
      algorithmic_latency_ms: 20
      lookahead_ms: 10
      realtime_safe: true
      verbose: false
  - type: repair
    name: decrackle
    config:
      enabled: true
      strength: mild
  - type: bandwidth
    name: flashsr_onnx
    config:
      enabled: true
      variant: full
      cache_dir: data/checkpoints/flashsr
      auto_download: true
      provider: CPUExecutionProvider
      num_threads: 1
      input_sample_rate: 16000
      output_sample_rate: 48000
      processing_mode: overlap
      block_ms: 20
      hop_ms: 10
      startup_fallback: silence
      algorithmic_latency_ms: 20
      output_gain_db: -3.0
      clamp_output: true
  - type: vad
    name: energy
    config: ${vad}
  - type: tone
    name: warm_rounded_voice
    config:
      mode: warm_smooth
  - type: limiter
    name: limiter
    config:
      ceiling_dbfs: -1.0
